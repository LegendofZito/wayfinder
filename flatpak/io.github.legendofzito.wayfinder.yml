id: io.github.legendofzito.wayfinder

runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

command: wayfinder

finish-args:
  # Display
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  # Full filesystem access (required for a file manager)
  - --filesystem=host
  # Trash support
  - --filesystem=xdg-data/Trash
  # Allow launching other apps via xdg-open
  - --talk-name=org.freedesktop.portal.OpenURI
  - --talk-name=org.freedesktop.portal.FileChooser

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  env:
    CARGO_HOME: /run/build/wayfinder/cargo
    CARGO_NET_OFFLINE: "true"
    npm_config_offline: "true"
    npm_config_cache: /run/build/wayfinder/npm-cache

modules:
  - name: wayfinder
    buildsystem: simple
    build-commands:
      # Install Node dependencies from cache
      - npm ci --offline --cache ${npm_config_cache}
      # Build frontend
      - npm run build
      # Build Tauri app without bundling (we install manually)
      - cargo build --release --manifest-path src-tauri/Cargo.toml --offline
      # Install binary
      - install -Dm755 src-tauri/target/release/wayfinder /app/bin/wayfinder
      # Install desktop file (Tauri generates this during a full bundle; we provide it here)
      - install -Dm644 flatpak/io.github.legendofzito.wayfinder.desktop
          /app/share/applications/io.github.legendofzito.wayfinder.desktop
      # Install metainfo
      - install -Dm644 src-tauri/io.github.legendofzito.wayfinder.metainfo.xml
          /app/share/metainfo/io.github.legendofzito.wayfinder.metainfo.xml
      # Install icons
      - install -Dm644 src-tauri/icons/32x32.png
          /app/share/icons/hicolor/32x32/apps/io.github.legendofzito.wayfinder.png
      - install -Dm644 src-tauri/icons/128x128.png
          /app/share/icons/hicolor/128x128/apps/io.github.legendofzito.wayfinder.png
      - install -Dm644 src-tauri/icons/128x128@2x.png
          /app/share/icons/hicolor/256x256/apps/io.github.legendofzito.wayfinder.png
      - install -Dm644 src-tauri/icons/icon.png
          /app/share/icons/hicolor/scalable/apps/io.github.legendofzito.wayfinder.png
    sources:
      - type: git
        url: https://github.com/LegendofZito/wayfinder.git
        # Update this tag each release:
        tag: v0.1.0
        commit: e413386fe326522eb71fbf7c20e3960dea0c3459
      # Generated by: python3 flatpak-cargo-generator.py src-tauri/Cargo.lock -o flatpak/cargo-sources.json
      - cargo-sources.json
      # Generated by: python3 flatpak-node-generator.py npm package-lock.json -o flatpak/node-sources.json
      - node-sources.json
